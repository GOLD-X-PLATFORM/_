<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLD X - الحساب والتوثيق</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f8fafc; }
        .header-bg {
            background: linear-gradient(135deg, #0b3c95 0%, #05245e 100%);
            border-bottom-left-radius: 2rem;
            border-bottom-right-radius: 2rem;
        }
    </style>
</head>
<body class="text-slate-800 font-sans antialiased min-h-screen pb-24">

    <div class="header-bg text-white px-6 pt-6 pb-20 shadow-lg relative text-center">
        <div class="flex justify-between items-center max-w-md mx-auto">
            <a href="dashboard.html" class="text-xl p-2 hover:bg-white/10 rounded-full transition cursor-pointer">
                <i class="fas fa-arrow-right"></i>
            </a>
            <h1 class="text-lg font-bold">الملف الشخصي</h1>
            <button onclick="logout()" class="text-lg p-2 hover:bg-red-500/20 text-red-300 rounded-full transition cursor-pointer">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </div>

        <div class="mt-6 flex flex-col items-center justify-center">
            <div class="w-16 h-16 rounded-full bg-slate-200 border-4 border-white/20 flex items-center justify-center text-slate-700 text-2xl font-bold shadow-inner">
                <i class="fas fa-user text-slate-400"></i>
            </div>
            <h2 id="profile-username" class="text-base font-bold mt-2">جاري التحميل...</h2>
            <p id="profile-email" class="text-xs text-blue-200 mt-0.5">user@example.com</p>
        </div>
    </div>

    <div class="px-4 -mt-8 max-w-md mx-auto relative z-10 space-y-4">
        
        <div class="bg-white rounded-2xl shadow-md p-5 border border-slate-100">
            <h3 class="font-bold text-slate-900 text-sm text-right mb-3 flex items-center gap-1.5 justify-end">
                توثيق الحساب (KYC) <i class="fas fa-shield-alt text-blue-600"></i>
            </h3>
            
            <div class="bg-slate-50 border border-slate-100 rounded-xl p-3 flex items-center justify-between">
                <div class="text-right">
                    <span class="text-xs font-bold text-slate-500 block">حالة التوثيق الحالي</span>
                    <span id="kyc-status-text" class="text-xs font-black text-amber-600 mt-1 block">غير موثق</span>
                </div>
                <div id="kyc-status-icon" class="w-9 h-9 bg-amber-50 text-amber-600 rounded-full flex items-center justify-center text-sm">
                    <i class="fas fa-user-clock"></i>
                </div>
            </div>

            <button id="kyc-btn" onclick="startKYC()" class="w-full bg-[#0b3c95] hover:bg-[#05245e] text-white font-bold py-3 rounded-xl text-xs transition shadow-sm mt-4 cursor-pointer">
                رفع بطاقة الهوية / جواز السفر
            </button>
        </div>

        <div class="bg-white rounded-2xl shadow-md p-5 border border-slate-100 space-y-3.5 text-right">
            <h3 class="font-bold text-slate-900 text-sm mb-1 flex items-center gap-1.5 justify-end">
                إعدادات الأمان <i class="fas fa-lock-open text-slate-500"></i>
            </h3>
            
            <div class="border-b border-slate-50 pb-2.5">
                <span class="text-[10px] text-slate-400 block">معرّف المستخدم المالي (ID)</span>
                <span id="profile-id" class="text-xs font-mono font-bold text-slate-700 block mt-0.5">uuid-loading...</span>
            </div>
            
            <div>
                <span class="text-[10px] text-slate-400 block">تاريخ الانضمام للمنصة</span>
                <span id="profile-joined" class="text-xs font-bold text-slate-700 block mt-0.5">2026/01/01</span>
            </div>
        </div>

    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 py-2 shadow-2xl z-50">
        <div class="max-w-md mx-auto grid grid-cols-5 text-center items-center">
            <button class="text-slate-400 hover:text-blue-600 flex flex-col items-center gap-1 cursor-pointer">
                <i class="fas fa-file-alt text-lg"></i><span class="text-[10px]">التقارير</span>
            </button>
            <button class="text-slate-400 hover:text-blue-600 flex flex-col items-center gap-1 cursor-pointer">
                <i class="fas fa-briefcase text-lg"></i><span class="text-[10px]">المهام</span>
            </button>
            <div class="relative -mt-6 flex justify-center">
                <a href="dashboard.html" class="w-14 h-14 bg-blue-600 text-white rounded-full flex items-center justify-center text-xl shadow-lg shadow-blue-600/40 border-4 border-white flex justify-center items-center">
                    <i class="fas fa-home"></i>
                </a>
            </div>
            <button class="text-slate-400 hover:text-blue-600 flex flex-col items-center gap-1 cursor-pointer">
                <i class="fas fa-question-circle text-lg"></i><span class="text-[10px]">المساعدة</span>
            </button>
            <button class="text-[#0b3c95] flex flex-col items-center gap-1 cursor-pointer">
                <i class="fas fa-user-circle text-lg"></i><span class="text-[10px]">الحساب</span>
            </button>
        </div>
    </div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script>
    async function loadProfilePage() {
        const profile = await getUserProfile();
        if (profile) {
            document.getElementById('profile-name').innerText = profile.full_name;
            document.getElementById('profile-uid').innerText = "UID: " + profile.id.substring(0,8);
        }
    }

    document.getElementById('kyc-form')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('kyc-submit-btn');
        const fileInput = document.getElementById('kyc-file');
        
        if (!fileInput || fileInput.files.length === 0) {
            alert("يرجى اختيار ملف الهوية أو جواز السفر أولاً");
            return;
        }

        btn.disabled = true;
        btn.innerText = 'جاري رفع الملف وحفظه بأمان...';

        try {
            const { data: { user } } = await window.supabaseClient.auth.getUser();
            const file = fileInput.files[0];
            const fileExt = file.name.split('.').pop();
            const filePath = `${user.id}/kyc_${Date.now()}.${fileExt}`;

            // رفع الملف الفعلي في الحاوية التخزينية المخصصة
            const { error: uploadError } = await window.supabaseClient.storage
                .from('kyc-documents')
                .upload(filePath, file);

            if (uploadError) throw uploadError;

            // تحديث حالة الحساب الشخصي لـ قيد المراجعة وتخزين رابط الوثيقة
            const { error: updateError } = await window.supabaseClient
                .from('profiles')
                .update({ kyc_status: 'pending', kyc_document_url: filePath })
                .eq('id', user.id);

            if (updateError) throw updateError;

            alert("تم رفع وثائق الهوية بنجاح، ملفك الآن قيد المراجعة الأمنية التلقائية.");
            window.location.reload();
        } catch (err) {
            alert("خطأ أثناء معالجة الرفع: " + err.message);
            btn.disabled = false;
            btn.innerText = 'إرسال التوثيق';
        }
    });

    window.addEventListener('DOMContentLoaded', loadProfilePage);
</script>
</body>
</html>
