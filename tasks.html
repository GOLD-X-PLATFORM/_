<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLD X - المهام اليومية</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f8fafc; }
        .header-bg {
            background: linear-gradient(135deg, #0b3c95 0%, #05245e 100%);
            border-bottom-left-radius: 2rem;
            border-bottom-right-radius: 2rem;
        }
    </style>
</head>
<body class="text-slate-800 font-sans antialiased min-h-screen pb-24">

    <div class="header-bg text-white px-6 pt-6 pb-14 shadow-lg text-center relative">
        <div class="flex justify-between items-center max-w-md mx-auto">
            <a href="dashboard.html" class="text-xl p-2 hover:bg-white/10 rounded-full transition cursor-pointer">
                <i class="fas fa-arrow-right"></i>
            </a>
            <h1 class="text-lg font-bold">المهام اليومية</h1>
            <div class="w-9 h-9 bg-amber-500 rounded-full flex items-center justify-center text-slate-950 font-bold shadow">
                <i class="fas fa-tasks"></i>
            </div>
        </div>
        <div class="max-w-md mx-auto mt-4">
            <p class="text-blue-200 text-xs font-medium">أكمل المهام بضغطة زر لزيادة رصيدك وأرباح فريقك</p>
        </div>
    </div>

    <div class="px-4 mt-6 max-w-md mx-auto">
        <div id="tasks-list" class="space-y-3.5">
            <div class="text-center py-10 text-slate-400 text-sm">
                <i class="fas fa-circle-notch animate-spin text-xl text-[#0b3c95] mb-2 block"></i>
                جاري جلب مهام اليوم...
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 py-2 shadow-2xl z-50">
        <div class="max-w-md mx-auto grid grid-cols-5 text-center items-center">
            <button class="text-slate-400 hover:text-blue-600 flex flex-col items-center gap-1 cursor-pointer">
                <i class="fas fa-file-alt text-lg"></i><span class="text-[10px]">التقارير</span>
            </button>
            <button class="text-[#0b3c95] flex flex-col items-center gap-1 cursor-pointer">
                <i class="fas fa-briefcase text-lg"></i><span class="text-[10px]">المهام</span>
            </button>
            <div class="relative -mt-6 flex justify-center">
                <a href="dashboard.html" class="w-14 h-14 bg-blue-600 text-white rounded-full flex items-center justify-center text-xl shadow-lg shadow-blue-600/40 border-4 border-white flex justify-center items-center">
                    <i class="fas fa-home"></i>
                </a>
            </div>
            <button class="text-slate-400 hover:text-blue-600 flex flex-col items-center gap-1 cursor-pointer">
                <i class="fas fa-question-circle text-lg"></i><span class="text-[10px]">المساعدة</span>
            </button>
            <button class="text-slate-400 hover:text-blue-600 flex flex-col items-center gap-1 cursor-pointer">
                <i class="fas fa-user-circle text-lg"></i><span class="text-[10px]">الحساب</span>
            </button>
        </div>
    </div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script>
    // إعادة بناء آلية الجلب الديناميكي الفوري للمهام لتعرض في الواجهة
    async function fetchDailyTasks() {
        const container = document.getElementById('tasks-container'); // تأكد من وجود هذا الـ ID في الـ HTML لديك لتفريغ المهام داخله
        if (!container) return;

        try {
            const profile = await getUserProfile();
            if (!profile) return;

            // جلب قائمة المهام المتوفرة في قاعدة البيانات بالكامل
            const { data: tasks, error: tasksError } = await window.supabaseClient
                .from('tasks')
                .select('*');

            if (tasksError) throw tasksError;

            // جلب المهام التي أتمها المستخدم اليوم لكي لا يكررها
            const { data: completedTasks, error: compError } = await window.supabaseClient
                .from('user_tasks')
                .select('task_id')
                .eq('user_id', profile.id);

            const completedIds = completedTasks ? completedTasks.map(c => c.task_id) : [];

            container.innerHTML = ''; // تصفير جمل التحميل المؤقتة

            if (tasks.length === 0) {
                container.innerHTML = '<p class="no-data">لا توجد مهام متوفرة اليوم.</p>';
                return;
            }

            tasks.forEach(task => {
                const isDone = completedIds.includes(task.id);
                const buttonHTML = isDone 
                    ? `<button class="btn done" disabled>تم الإتمام بنجاح</button>` 
                    : `<button class="btn action-btn" onclick="executeTask(${task.id})">تنفيذ المهمة (+${task.reward} USDT)</button>`;

                // توليد بطاقات المهام مع الحفاظ التام على البنية العامة للواجهات
                container.innerHTML += `
                    <div class="task-card">
                        <div class="task-info">
                            <h4>${task.title}</h4>
                            <p>${task.description}</p>
                        </div>
                        <div class="task-action">
                            ${buttonHTML}
                        </div>
                    </div>
                `;
            });

        } catch (err) {
            container.innerHTML = `<p class="error-msg">خطأ أثناء جلب المهام: ${err.message}</p>`;
        }
    }

    // دالة تنفيذ المهمة الآمنة المعدلة (تعتمد على معرف المهمة فقط، وقيمة الربح تأتي من الخادم)
    async function executeTask(taskId) {
        const btn = event.target;
        btn.disabled = true;
        btn.innerText = 'جاري التحقق وضخ الأرباح...';

        try {
            // استدعاء الـ RPC المعدل الخالي من ثغرة إرسال مبالغ المكافأة من المتصفح
            const { data: success, error } = await window.supabaseClient.rpc('complete_user_task', {
                target_task_id: taskId
            });

            if (error) throw error;

            if (success) {
                alert("مبروك! تم التحقق من تنفيذ المهمة وتم إيداع الأرباح في رصيدك.");
                window.location.reload();
            } else {
                alert("فشل العملية: يبدو أنك قمت بإتمام هذه المهمة مسبقاً اليوم!");
                btn.disabled = false;
                btn.innerText = 'تنفيذ المهمة';
            }
        } catch (err) {
            alert("خطأ في الخادم: " + err.message);
            btn.disabled = false;
            btn.innerText = 'تنفيذ المهمة';
        }
    }

    window.addEventListener('DOMContentLoaded', fetchDailyTasks);
</script>
  </body>
</html>
