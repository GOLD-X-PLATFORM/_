<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLD X - المهام اليومية</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f8fafc; }
        .header-bg {
            background: linear-gradient(135deg, #0b3c95 0%, #05245e 100%);
            border-bottom-left-radius: 2rem;
            border-bottom-right-radius: 2rem;
        }
    </style>
</head>
<body class="text-slate-800 font-sans antialiased min-h-screen pb-24">

    <div class="header-bg text-white px-6 pt-6 pb-14 shadow-lg text-center relative">
        <div class="flex justify-between items-center max-w-md mx-auto">
            <a href="dashboard.html" class="text-xl p-2 hover:bg-white/10 rounded-full transition cursor-pointer">
                <i class="fas fa-arrow-right"></i>
            </a>
            <h1 class="text-lg font-bold">المهام اليومية</h1>
            <div class="w-9 h-9 bg-amber-500 rounded-full flex items-center justify-center text-slate-950 font-bold shadow">
                <i class="fas fa-tasks"></i>
            </div>
        </div>
        <div class="max-w-md mx-auto mt-4">
            <p class="text-blue-200 text-xs font-medium">أكمل المهام بضغطة زر لزيادة رصيدك وأرباح فريقك</p>
        </div>
    </div>

    <div class="px-4 mt-6 max-w-md mx-auto">
        <div id="tasks-list" class="space-y-3.5">
            <div class="text-center py-10 text-slate-400 text-sm">
                <i class="fas fa-circle-notch animate-spin text-xl text-[#0b3c95] mb-2 block"></i>
                جاري جلب مهام اليوم...
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 py-2 shadow-2xl z-50">
        <div class="max-w-md mx-auto grid grid-cols-5 text-center items-center">
            <button class="text-slate-400 hover:text-blue-600 flex flex-col items-center gap-1 cursor-pointer">
                <i class="fas fa-file-alt text-lg"></i><span class="text-[10px]">التقارير</span>
            </button>
            <button class="text-[#0b3c95] flex flex-col items-center gap-1 cursor-pointer">
                <i class="fas fa-briefcase text-lg"></i><span class="text-[10px]">المهام</span>
            </button>
            <div class="relative -mt-6 flex justify-center">
                <a href="dashboard.html" class="w-14 h-14 bg-blue-600 text-white rounded-full flex items-center justify-center text-xl shadow-lg shadow-blue-600/40 border-4 border-white flex justify-center items-center">
                    <i class="fas fa-home"></i>
                </a>
            </div>
            <button class="text-slate-400 hover:text-blue-600 flex flex-col items-center gap-1 cursor-pointer">
                <i class="fas fa-question-circle text-lg"></i><span class="text-[10px]">المساعدة</span>
            </button>
            <button class="text-slate-400 hover:text-blue-600 flex flex-col items-center gap-1 cursor-pointer">
                <i class="fas fa-user-circle text-lg"></i><span class="text-[10px]">الحساب</span>
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
    <script>
        async function fetchDailyTasks() {
            try {
                const listContainer = document.getElementById('tasks-list');
                const { data: { user } } = await supabase.auth.getUser();
                if (!user) {
                    window.location.href = "signin.html";
                    return;
                }

                // 1. جلب كافة المهام النشطة المتوفرة بالمنصة
                const { data: tasks, error: tasksError } = await supabase
                    .from('tasks')
                    .select('*')
                    .eq('is_active', true);

                if (tasksError) throw tasksError;

                // 2. جلب المهام التي نفذها المستخدم مسبقاً لمنع التكرار
                const { data: userCompleted } = await supabase
                    .from('user_tasks')
                    .select('task_id')
                    .eq('user_id', user.id);

                const completedIds = userCompleted ? userCompleted.map(item => item.task_id) : [];

                listContainer.innerHTML = "";

                if (tasks.length === 0) {
                    listContainer.innerHTML = `<div class="text-center py-10 text-slate-400 text-sm">لا توجد مهام نشطة حالياً. انتظر عروض الإدارة!</div>`;
                    return;
                }

                // 3. بناء بطاقات المهام بالهوية البصرية المطلوبة
                tasks.forEach(task => {
                    const isDone = completedIds.includes(task.id);
                    const card = document.createElement('div');
                    card.className = "bg-white rounded-2xl p-4 shadow-sm border border-slate-100 flex justify-between items-center transition hover:shadow-md";
                    
                    card.innerHTML = `
                        <div class="text-right flex-1 pl-2">
                            <h3 class="font-bold text-slate-900 text-sm flex items-center gap-1.5">
                                <span class="w-2 h-2 rounded-full ${isDone ? 'bg-green-500' : 'bg-blue-600'}"></span>
                                ${task.title}
                            </h3>
                            <p class="text-[11px] text-slate-400 mt-1 leading-relaxed">${task.description || ''}</p>
                            <span class="inline-flex items-center gap-1 bg-amber-50 text-amber-700 font-extrabold text-[11px] px-2 py-0.5 rounded-lg mt-2 border border-amber-100">
                                <i class="fas fa-plus text-[9px]"></i> $${task.reward_amount.toFixed(2)}
                            </span>
                        </div>
                        <div class="shrink-0">
                            ${isDone ? 
                                `<span class="bg-green-50 text-green-600 text-xs font-bold px-3 py-2 rounded-xl flex items-center gap-1 border border-green-100"><i class="fas fa-check-circle"></i> مكتملة</span>` : 
                                `<button onclick="executeTask(${task.id})" class="bg-[#0b3c95] hover:bg-[#05245e] text-white text-xs font-bold px-4 py-2.5 rounded-xl transition shadow-sm cursor-pointer transform active:scale-95">بدء التنفيذ</button>`
                            }
                        </div>
                    `;
                    listContainer.appendChild(card);
                });

            } catch (error) {
                console.error("خطأ جلب البيانات:", error.message);
            }
        }

        async function executeTask(taskId) {
            try {
                const { data: { user } } = await supabase.auth.getUser();
                
                // إضافة سجل إتمام المهمة، ليقوم الـ Trigger المالي على السيرفر بخصم وتوزيع العمولات فوراً
                const { error } = await supabase
                    .from('user_tasks')
                    .insert([{ user_id: user.id, task_id: taskId, status: 'completed' }]);

                if (error) throw error;

                alert("ممتاز! تم تسجيل المهمة بنجاح وصرف أرباحك وأرباح فريقك الهرمي.");
                fetchDailyTasks(); // إعادة التحميل وتحديث الأرصده والبطاقات

            } catch (error) {
                alert("تعذر تنفيذ المهمة. قد تكون نفذتها بالفعل مسبقاً.");
                console.error(error.message);
            }
        }

        fetchDailyTasks();
    </script>
</body>
</html>
