<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLD X - إنشاء حساب جديد</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4?v=2026"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f8fafc; }
        .auth-header {
            background: linear-gradient(135deg, #0b3c95 0%, #05245e 100%);
            border-bottom-left-radius: 2.5rem;
            border-bottom-right-radius: 2.5rem;
        }
    </style>
</head>
<body class="text-slate-800 font-sans antialiased min-h-screen flex flex-col justify-between pb-6">

    <div class="auth-header text-white px-6 pt-10 pb-16 shadow-xl text-center relative">
        <div class="max-w-md mx-auto">
            <h1 class="text-2xl font-black tracking-wider text-amber-400">GOLD X</h1>
            <p class="text-xs text-blue-200 mt-2">انضم لعائلة المستثمرين اليوم وابدأ في جمع الـ 4% يومياً.</p>
        </div>
    </div>

    <div class="px-4 -mt-10 max-w-md mx-auto w-full flex-grow my-auto">
        <div class="bg-white rounded-3xl shadow-xl p-6 border border-slate-100 text-right">
            <form id="signup-form" class="space-y-4">
                
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1.5">الاسم الكامل</label>
                    <div class="relative">
                        <span class="absolute right-3 top-3 text-slate-400 text-xs"><i class="fas fa-user"></i></span>
                        <input type="text" id="fullname" required class="w-full bg-slate-50 border border-slate-200 rounded-xl pr-9 pl-4 py-2.5 text-xs text-slate-700 focus:outline-none focus:border-[#0b3c95]" placeholder="الاسم ثلاثي أو ثنائي">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1.5">البريد الإلكتروني</label>
                    <div class="relative">
                        <span class="absolute right-3 top-3 text-slate-400 text-xs"><i class="fas fa-envelope"></i></span>
                        <input type="email" id="email" required class="w-full bg-slate-50 border border-slate-200 rounded-xl pr-9 pl-4 py-2.5 text-xs text-slate-700 focus:outline-none focus:border-[#0b3c95]" placeholder="name@example.com">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1.5">كلمة المرور (6 خانات أو أكثر)</label>
                    <div class="relative">
                        <span class="absolute right-3 top-3 text-slate-400 text-xs"><i class="fas fa-lock"></i></span>
                        <input type="password" id="password" required minlength="6" class="w-full bg-slate-50 border border-slate-200 rounded-xl pr-9 pl-4 py-2.5 text-xs text-slate-700 focus:outline-none focus:border-[#0b3c95]" placeholder="••••••••">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1.5">كود الإحالة (اختياري)</label>
                    <div class="relative">
                        <span class="absolute right-3 top-3 text-slate-400 text-xs"><i class="fas fa-gift"></i></span>
                        <input type="text" id="referral-code" class="w-full bg-slate-50 border border-slate-200 rounded-xl pr-9 pl-4 py-2.5 text-xs text-slate-700 focus:outline-none focus:border-[#0b3c95]" placeholder="اكتب كود الشخص الذي دعاك">
                    </div>
                </div>

             <!-- كود مربع حيز الشروط والقوانين المعدل والمحمي -->
<div class="flex items-center justify-start gap-2 my-4">
    <input type="checkbox" id="agree-terms" required class="w-4 h-4 rounded bg-gray-800 border-gray-700 text-yellow-600 focus:ring-0 cursor-pointer">
    <label for="agree-terms" class="text-sm text-gray-300 cursor-pointer select-none">
        أوافق على <a href="disclaimer.html" class="underline gold-text font-bold hover:text-yellow-500 transition-colors">جميع الشروط والقوانين</a> الخاصة بمنصة GOLD X الاستثمارية.
    </label>
</div>

                <button type="submit" id="submit-btn" class="w-full bg-[#0b3c95] hover:bg-[#05245e] text-white font-bold py-2.5 rounded-xl text-xs transition shadow-md cursor-pointer transform active:scale-95">
                    <i class="fas fa-user-plus ml-1"></i> إنشاء الحساب وتفعيله
                </button>
            </form>

            <div class="text-center mt-5 pt-4 border-t border-slate-100">
                <p class="text-xs text-slate-400">تمتلك حساباً بالفعل؟ <a href="signin.html?v=2026" class="text-blue-600 font-bold hover:underline">قم بتسجيل الدخول من هنا</a></p>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
<script>
    document.getElementById('signup-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.querySelector('button[type="submit"]');
    const originalText = btn.innerText;
    btn.disabled = true;
    btn.innerText = 'جاري الإنشاء...';

    // جلب قيم الحقول
    const fullname = document.getElementById('fullname').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const referralInput = document.getElementById('referral-code');
    const referralCode = referralInput ? referralInput.value.trim() : '';

    try {
        // 1. إنشاء الحساب في نظام التوثيق
        const { data, error: authError } = await window.supabaseClient.auth.signUp({ email, password });
        if (authError) throw authError;
        if (!data.user) throw new Error("فشل إنشاء الحساب، يرجى المحاولة لاحقاً.");

        // 2. معالجة الإحالة (إن وجدت)
        let referrerUUID = null;
        if (referralCode) {
            const { data: refData, error: refError } = await window.supabaseClient
                .from('profiles')
                .select('id')
                .eq('my_referral_code', referralCode)
                .single();
            
            if (refData && !refError) {
                referrerUUID = refData.id;
            }
        }

        // 3. إنشاء كود إحالة خاص بالمستخدم الجديد
        const userRandomCode = 'GX' + Math.floor(100000 + Math.random() * 900000);
        const currentDomain = window.location.origin + window.location.pathname.replace('signup.html', '');
        const generatedLink = `${currentDomain}signup.html?ref=${userRandomCode}`;

        // 4. تجهيز بيانات الملف الشخصي
        const profileData = {
            id: data.user.id,
            full_name: fullname,
            balance: 0.00,
            vip_level: 'VIP 0',
            my_referral_code: userRandomCode,
            referral_link: generatedLink
        };

        // إضافة معرّف المُحيل فقط إذا كان موجوداً وصحيحاً
        if (referrerUUID) {
            profileData.referred_by = referrerUUID;
        }

        // 5. حفظ البيانات في جدول profiles
        const { error: profileError } = await window.supabaseClient
            .from('profiles')
            .insert([profileData]);

        if (profileError) throw profileError;

        alert("تم إنشاء الحساب بنجاح! مرحباً بك في GOLD X.");
        window.location.href = "dashboard.html";

    } catch (err) {
        alert("حدث خطأ: " + err.message);
        btn.disabled = false;
        btn.innerText = originalText;
    }
});

// تعبئة حقل الإحالة تلقائياً من الرابط إن وجد
window.addEventListener('DOMContentLoaded', () => {
    const urlParams = new URLSearchParams(window.location.search);
    const ref = urlParams.get('ref');
    const referralInput = document.getElementById('referral-code');
    if (ref && referralInput) {
        referralInput.value = ref;
        // جعل الحقل غير قابل للتعديل إذا جاء من رابط لمنع التلاعب
        referralInput.readOnly = true; 
        referralInput.classList.add('bg-gray-200', 'cursor-not-allowed');
    }
});
</script>
</body>
</html>
